services:
  postgres:
    image: postgres:16-alpine
    container_name: saptambu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: saptambu
      POSTGRES_PASSWORD: saptambu
      POSTGRES_DB: saptambu
    ports:
      - "5433:5432"
    volumes:
      - saptambu-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U saptambu -d saptambu"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  saptambu-postgres-data:
